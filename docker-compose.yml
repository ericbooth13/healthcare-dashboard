services:
  db:
    image: postgres:16
    container_name: healthcare_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patients_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d patients_db"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ./backend
    container_name: healthcare_api
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/patients_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: healthcare_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
      
volumes:
  postgres_data: